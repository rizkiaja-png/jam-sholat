<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Sholat - Rumah Rizki</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Diubah agar di HP bisa di-scroll jika layar terlalu pendek */
            overflow-y: auto; 
            overflow-x: hidden;
            color: #fff;
            min-height: 100vh;
        }

        /* Layar Klik Mulai */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }
        #start-screen h1 {
            font-size: 2rem;
            color: #f39c12;
            text-align: center;
            animation: pulse 1.5s infinite;
            padding: 0 20px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Background Slider */
        #bg-slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-size: cover;
            background-position: center;
            transition: background-image 2s ease-in-out;
        }

        /* Glassmorphism Styles */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            color: #333;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            margin: 20px;
        }

        .time-container {
            text-align: left;
        }
        .time-container h1 {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
        }

        .location-container {
            text-align: center;
        }
        .location-container h2 {
            font-size: 1.8rem;
            color: #b56b27;
        }
        .location-container p {
            font-size: 0.9rem;
            color: #555;
            margin-top: 5px;
        }

        .date-container {
            text-align: right;
        }
        .date-container h3 {
            font-size: 1.3rem;
        }
        .date-container p {
            font-size: 0.9rem;
            color: #555;
        }

        /* Bottom Prayer Times */
        .prayer-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            display: flex;
            justify-content: space-between;
            padding: 0;
            overflow: hidden;
        }

        .prayer-box {
            flex: 1;
            text-align: center;
            padding: 20px 10px;
            border-right: 1px solid rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 125px;
        }
        .prayer-box:last-child {
            border-right: none;
        }

        .prayer-box h4 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }
        .prayer-box .time {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .prayer-box .countdown {
            display: none; 
        }

        /* Active/Next Prayer Highlight */
        .prayer-box.active {
            background: #f39c12; 
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
            border-radius: 20px;
            border: none;
            z-index: 10;
        }
        .prayer-box.active h4 {
            color: #fff;
        }

        /* Tampilan Countdown Aktif dengan Latar Belakang */
        .prayer-box.active .countdown {
            display: inline-block;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 5px;
            color: #fff;
            background: rgba(0, 0, 0, 0.3); 
            padding: 4px 12px;
            border-radius: 8px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }

        /* Alarm Overlay */
        #alarm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        #alarm-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        #alarm-overlay h1 {
            font-size: 5rem;
            color: #f39c12;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-align: center;
        }
        #alarm-overlay .alarm-clock {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 20px;
            font-weight: 700;
        }
        #alarm-overlay p.message {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 10px;
            text-align: center;
            padding: 0 20px;
        }
        #alarm-overlay p.wudhu {
            font-size: 1.5rem;
            color: #e74c3c;
            animation: pulse 1s infinite;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
        }
        #alarm-overlay .alarm-countdown {
            font-size: 1.5rem;
            color: #bbb;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }

        /* =========================================
           MEDIA QUERIES (TAMPILAN MOBILE / HP) 
           ========================================= */
        @media (max-width: 900px) {
            .header {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
            }
            .time-container, .location-container, .date-container {
                text-align: center;
            }
            
            /* Mengubah posisi jadwal sholat di HP agar rapi */
            .prayer-container {
                position: relative;
                bottom: auto;
                left: 0;
                transform: none;
                width: 90%;
                margin: 20px auto;
                display: grid;
                grid-template-columns: repeat(3, 1fr); /* 3 Kolom */
                border-radius: 15px;
            }
            .prayer-box {
                border-right: 1px solid rgba(0,0,0,0.1);
                border-bottom: 1px solid rgba(0,0,0,0.1);
                min-height: 100px;
                padding: 10px;
            }
            .prayer-box:last-child {
                border-bottom: none;
            }
            .prayer-box h4 {
                font-size: 1rem;
            }
            .prayer-box .time {
                font-size: 1.5rem;
            }
        }

        /* Tampilan untuk layar HP yang lebih kecil lagi */
        @media (max-width: 600px) {
            .time-container h1 { font-size: 3rem; }
            .location-container h2 { font-size: 1.5rem; }
            
            .prayer-container {
                grid-template-columns: repeat(2, 1fr); /* 2 Kolom */
            }
            /* Karena ada 7 jadwal (ganjil), jadikan kotak terakhir penuh 2 kolom */
            .prayer-box:last-child {
                grid-column: span 2; 
                border-right: none;
            }

            /* Perkecil font di layar alarm untuk HP */
            #alarm-overlay h1 { font-size: 3rem; }
            #alarm-overlay .alarm-clock { font-size: 2rem; }
            #alarm-overlay p.message { font-size: 1.2rem; }
            #alarm-overlay p.wudhu { font-size: 1.2rem; }
            #alarm-overlay .alarm-countdown { font-size: 1.2rem; }
            #start-screen h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="startApp()">
        <h1 id="start-text">Memuat Audio YouTube Makkah...<br>Tunggu Sebentar...</h1>
    </div>

    <div id="yt-player" style="position: absolute; top: -9999px; left: -9999px;"></div>

    <audio id="adzan-audio" preload="auto">
        <source src="adzan.mp3" type="audio/mpeg">
    </audio>

    <div id="bg-slider"></div>

    <div id="alarm-overlay">
        <h1 id="alarm-title">Waktu Sholat</h1>
        <div class="alarm-clock" id="alarm-clock">00:00:00</div>
        <p class="message">Harap tenang, ibadah sedang berlangsung.</p>
        <p class="wudhu">Segera Ambil Air Wudhu!</p>
        <div class="alarm-countdown" id="alarm-countdown">Sisa Waktu Jeda: 15:00</div>
    </div>

    <div class="header glass">
        <div class="time-container">
            <h1 id="current-time">00:00:00</h1>
        </div>
        <div class="location-container">
            <h2>🕌 Rumah Rizki</h2>
            <p>Jl. Suhada 2 Parit 7 Rumah No.44</p>
        </div>
        <div class="date-container">
            <h3 id="hijri-date">Memuat...</h3>
            <p id="masehi-date">Memuat...</p>
        </div>
    </div>

    <div class="prayer-container glass" id="prayer-list">
        </div>

    <script>
        // --- YOUTUBE API SETUP ---
        let ytPlayer;
        let isPlayerReady = false;
        let appStarted = false;

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '10',
                width: '10',
                videoId: 'Cm1v4bteXbI', 
                playerVars: {
                    'playsinline': 1,
                    'autoplay': 0,
                    'controls': 0
                },
                events: {
                    'onReady': function(event) {
                        isPlayerReady = true;
                        document.getElementById('start-text').innerHTML = "Audio Makkah Siap!<br>Klik Di Sini Untuk Memulai";
                    }
                }
            });
        }

        const adzanAudio = document.getElementById('adzan-audio');

        function startApp() {
            if (!isPlayerReady) {
                alert("YouTube masih proses memuat. Mohon tunggu beberapa detik lagi.");
                return;
            }

            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
            }, 500);
            
            ytPlayer.playVideo();
            appStarted = true;
            
            adzanAudio.play().then(() => {
                adzanAudio.pause();
                adzanAudio.currentTime = 0;
            }).catch(e => console.log("Adzan init:", e));
        }

        // --- BACKGROUND SLIDER ---
        const images = [
            'image/img1.jpg',
            'image/img2.jpg',
            'image/img0.jpg',
            'image/img2.jpg'
        ];
        
        let currentImgIndex = 0;
        const bgSlider = document.getElementById('bg-slider');

        function changeBackground() {
            bgSlider.style.backgroundImage = `url('${images[currentImgIndex]}')`;
            currentImgIndex = (currentImgIndex + 1) % images.length;
        }
        
        changeBackground();
        setInterval(changeBackground, 10000);

        // --- FETCH JADWAL SHOLAT ---
        let jadwalHariIni = {};
        
        async function fetchJadwal() {
            try {
                const response = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Tembilahan&country=Indonesia&method=11');
                const data = await response.json();
                
                const timings = data.data.timings;
                const hijri = data.data.date.hijri;
                
                document.getElementById('hijri-date').innerText = `${hijri.day} ${hijri.month.en} ${hijri.year} H`;
                
                jadwalHariIni = {
                    "Imsak": timings.Imsak,
                    "Shubuh": timings.Fajr,
                    "Syuruq": timings.Sunrise,
                    "Dzuhur": timings.Dhuhr,
                    "Ashar": timings.Asr,
                    "Maghrib": timings.Maghrib,
                    "Isya'": timings.Isha
                };

                renderJadwal();
            } catch (error) {
                console.error("Gagal mengambil jadwal:", error);
            }
        }

        function renderJadwal() {
            const container = document.getElementById('prayer-list');
            container.innerHTML = '';
            
            for (let [nama, waktu] of Object.entries(jadwalHariIni)) {
                container.innerHTML += `
                    <div class="prayer-box" id="box-${nama}">
                        <h4>${nama}</h4>
                        <div class="time">${waktu}</div>
                        <div class="countdown" id="cd-${nama}"></div>
                    </div>
                `;
            }
        }

        function formatTime(val) {
            return val < 10 ? '0' + val : val;
        }

        // --- ALARM LOGIC ---
        let isAdzanPlaying = false;

        function checkAlarm(now) {
            let isAlarmActive = false;
            let activePrayerName = "";
            let remainingAlarmSecs = 0;

            const sholatWajib = ["Shubuh", "Dzuhur", "Ashar", "Maghrib", "Isya'"];
            const currentMins = (now.getHours() * 60) + now.getMinutes();
            const currentTotalSecs = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();

            for (let sholat of sholatWajib) {
                if (!jadwalHariIni[sholat]) continue;
                let [pH, pM] = jadwalHariIni[sholat].split(':').map(Number);
                let pTotalMins = (pH * 60) + pM;
                let pTotalSecs = pTotalMins * 60;

                if (currentTotalSecs >= pTotalSecs && currentTotalSecs < (pTotalSecs + 900)) {
                    isAlarmActive = true;
                    activePrayerName = sholat;
                    remainingAlarmSecs = (pTotalSecs + 900) - currentTotalSecs; 
                    break;
                }
            }

            const alarmOverlay = document.getElementById('alarm-overlay');
            
            if (isAlarmActive) {
                document.getElementById('alarm-title').innerText = `WAKTU SHOLAT ${activePrayerName.toUpperCase()}`;
                
                let rM = Math.floor(remainingAlarmSecs / 60);
                let rS = remainingAlarmSecs % 60;
                document.getElementById('alarm-countdown').innerText = `Sisa Waktu Jeda: ${formatTime(rM)}:${formatTime(rS)}`;

                alarmOverlay.classList.add('show');
                
                if (appStarted) {
                    if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') {
                        ytPlayer.pauseVideo();
                    }
                    if (!isAdzanPlaying) {
                        adzanAudio.currentTime = 0; 
                        adzanAudio.play().catch(e => console.log(e));
                        isAdzanPlaying = true;
                    }
                }
            } else {
                alarmOverlay.classList.remove('show');
                
                if (appStarted) {
                    if (isAdzanPlaying) {
                        adzanAudio.pause();
                        adzanAudio.currentTime = 0;
                        isAdzanPlaying = false;
                    }
                    if (ytPlayer && typeof ytPlayer.playVideo === 'function' && ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) {
                        ytPlayer.playVideo();
                    }
                }
            }
        }

        // --- HIGHLIGHT & COUNTDOWN ---
        function highlightAndCountdown(now) {
            if (Object.keys(jadwalHariIni).length === 0) return;

            let nextPrayer = null;
            let minDiffMs = Infinity;

            for (let [nama, waktu] of Object.entries(jadwalHariIni)) {
                let [pH, pM] = waktu.split(':').map(Number);
                let prayerDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), pH, pM, 0);

                if (prayerDate <= now) {
                    prayerDate.setDate(prayerDate.getDate() + 1);
                }

                let diffMs = prayerDate - now;
                if (diffMs < minDiffMs) {
                    minDiffMs = diffMs;
                    nextPrayer = nama;
                }
            }

            document.querySelectorAll('.prayer-box').forEach(el => {
                el.classList.remove('active');
            });

            if (nextPrayer) {
                const box = document.getElementById(`box-${nextPrayer}`);
                if (box) {
                    box.classList.add('active');
                    
                    let diffSecs = Math.floor(minDiffMs / 1000);
                    let h = Math.floor(diffSecs / 3600);
                    let m = Math.floor((diffSecs % 3600) / 60);
                    let s = diffSecs % 60;

                    let cdText = `-${formatTime(h)}:${formatTime(m)}:${formatTime(s)}`;
                    let cdEl = document.getElementById(`cd-${nextPrayer}`);
                    if (cdEl) cdEl.innerText = cdText;
                }
            }
        }

        function updateClock() {
            const now = new Date();
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('masehi-date').innerText = now.toLocaleDateString('id-ID', options);

            const h = formatTime(now.getHours());
            const m = formatTime(now.getMinutes());
            const s = formatTime(now.getSeconds());
            const timeString = `${h}:${m}:${s}`;
            
            document.getElementById('current-time').innerText = timeString;
            document.getElementById('alarm-clock').innerText = timeString;

            checkAlarm(now);
            highlightAndCountdown(now);
        }

        fetchJadwal().then(() => {
            updateClock();
            setInterval(updateClock, 1000); 
        });
    </script>
</body>
</html>
